name: TWM CI

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:22-alpine

    steps:
    - uses: actions/checkout@v2
    - name: Install dependencies
      run: |
        npm ci
    - name: Run tests
      run: |
        npm test